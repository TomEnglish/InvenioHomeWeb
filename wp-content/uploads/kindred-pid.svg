<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .draw-anim {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2s ease forwards;
    }
    .pop-anim { opacity: 0; animation: popIn 0.6s ease forwards; }
    .pd1 { animation-delay: 0.3s; }
    .pd2 { animation-delay: 0.8s; }
    .pd3 { animation-delay: 1.3s; }
    .pd4 { animation-delay: 1.8s; }
    .pd5 { animation-delay: 2.3s; }
    .dd1 { animation-delay: 0.6s; }
    .dd2 { animation-delay: 1.1s; }
    .dd3 { animation-delay: 1.6s; }
    text { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="420" fill="#0D1117"/>
  <rect width="900" height="420" fill="url(#g)"/>

  <!-- Title Block -->
  <rect x="10" y="10" width="880" height="400" fill="none" stroke="#334155" stroke-width="1.5" class="draw-anim"/>
  <rect x="620" y="370" width="270" height="40" fill="none" stroke="#334155" stroke-width="0.8"/>
  <text x="635" y="385" fill="#64748B" font-size="6">KINDRED INDUSTRIAL</text>
  <text x="635" y="396" fill="#94A3B8" font-size="7" font-weight="bold">P&amp;ID - BOILER FEEDWATER</text>
  <text x="635" y="405" fill="#64748B" font-size="5">DWG: PID-BFW-001 REV A</text>
  <text x="810" y="396" fill="#0891B2" font-size="5" font-weight="bold">AI GENERATED</text>

  <!-- AI indicator -->
  <rect x="20" y="20" width="155" height="18" rx="9" fill="rgba(8,145,178,0.15)" stroke="rgba(8,145,178,0.3)" stroke-width="0.8" class="pop-anim pd1"/>
  <circle cx="32" cy="29" r="3" fill="#0891B2"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
  <text x="42" y="32" fill="#22D3EE" font-size="6.5" class="pop-anim pd1">AI Generated | Rev A | IFD</text>

  <!-- Equipment: Deaerator -->
  <g class="pop-anim pd1">
    <rect x="70" y="110" width="65" height="90" rx="3" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="70" y1="145" x2="135" y2="145" stroke="#22D3EE" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="103" y="138" fill="#F1F5F9" font-size="7" text-anchor="middle">DA-101</text>
    <text x="103" y="165" fill="#64748B" font-size="5" text-anchor="middle">DEAERATOR</text>
  </g>

  <!-- Equipment: Pump -->
  <g class="pop-anim pd2">
    <circle cx="250" cy="200" r="20" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="234" y1="216" x2="266" y2="184" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="250" y="230" fill="#F1F5F9" font-size="7" text-anchor="middle">P-101A</text>
    <text x="250" y="242" fill="#64748B" font-size="5" text-anchor="middle">BFW PUMP</text>
  </g>

  <!-- Equipment: Economizer -->
  <g class="pop-anim pd3">
    <rect x="400" y="120" width="80" height="45" rx="3" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="415" y1="128" x2="415" y2="158" stroke="#22D3EE" stroke-width="0.8"/>
    <line x1="430" y1="128" x2="430" y2="158" stroke="#22D3EE" stroke-width="0.8"/>
    <line x1="445" y1="128" x2="445" y2="158" stroke="#22D3EE" stroke-width="0.8"/>
    <line x1="460" y1="128" x2="460" y2="158" stroke="#22D3EE" stroke-width="0.8"/>
    <text x="440" y="146" fill="#F1F5F9" font-size="7" text-anchor="middle">E-101</text>
    <text x="440" y="178" fill="#64748B" font-size="5" text-anchor="middle">ECONOMIZER</text>
  </g>

  <!-- Equipment: Steam Drum -->
  <g class="pop-anim pd4">
    <ellipse cx="600" cy="108" rx="55" ry="22" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <rect x="545" y="108" width="110" height="60" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <ellipse cx="600" cy="168" rx="55" ry="22" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="600" y="143" fill="#F1F5F9" font-size="7" text-anchor="middle">V-101</text>
    <text x="600" y="200" fill="#64748B" font-size="5" text-anchor="middle">STEAM DRUM</text>
  </g>

  <!-- Process Lines -->
  <line x1="135" y1="190" x2="230" y2="190" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd1"/>
  <line x1="230" y1="190" x2="230" y2="200" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd1"/>
  <text x="175" y="185" fill="#0891B2" font-size="5" class="pop-anim pd2">BFW-4"-CS-150</text>

  <line x1="270" y1="200" x2="350" y2="200" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd2"/>
  <line x1="350" y1="200" x2="350" y2="143" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd2"/>
  <line x1="350" y1="143" x2="400" y2="143" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd2"/>
  <text x="365" y="175" fill="#0891B2" font-size="5" class="pop-anim pd3">BFW-4"-CS-600</text>

  <line x1="480" y1="143" x2="545" y2="143" stroke="#0891B2" stroke-width="1.5" class="draw-anim dd3"/>

  <!-- Instruments -->
  <g class="pop-anim pd3">
    <circle cx="310" cy="200" r="11" fill="#1E293B" stroke="#F59E0B" stroke-width="1.2"/>
    <line x1="299" y1="200" x2="321" y2="200" stroke="#F59E0B" stroke-width="0.5"/>
    <text x="310" y="197" fill="#F59E0B" font-size="5" text-anchor="middle">FIC</text>
    <text x="310" y="205" fill="#F59E0B" font-size="5" text-anchor="middle">101</text>
  </g>

  <g class="pop-anim pd4">
    <circle cx="510" cy="118" r="11" fill="#1E293B" stroke="#F59E0B" stroke-width="1.2"/>
    <line x1="499" y1="118" x2="521" y2="118" stroke="#F59E0B" stroke-width="0.5"/>
    <text x="510" y="115" fill="#F59E0B" font-size="5" text-anchor="middle">TI</text>
    <text x="510" y="123" fill="#F59E0B" font-size="5" text-anchor="middle">102</text>
  </g>

  <g class="pop-anim pd5">
    <circle cx="670" cy="140" r="11" fill="#1E293B" stroke="#F59E0B" stroke-width="1.2"/>
    <line x1="659" y1="140" x2="681" y2="140" stroke="#F59E0B" stroke-width="0.5"/>
    <text x="670" y="137" fill="#F59E0B" font-size="5" text-anchor="middle">LIC</text>
    <text x="670" y="145" fill="#F59E0B" font-size="5" text-anchor="middle">103</text>
  </g>

  <!-- PSV -->
  <g class="pop-anim pd5">
    <path d="M 560 98 L 560 78 L 553 78 L 560 66 L 567 78 L 560 78" fill="none" stroke="#EF4444" stroke-width="1.2"/>
    <text x="560" y="62" fill="#EF4444" font-size="5" text-anchor="middle">PSV-101</text>
  </g>

  <!-- Notes -->
  <g class="pop-anim pd5">
    <rect x="30" y="300" width="240" height="80" fill="none" stroke="#334155" stroke-width="0.5" rx="4"/>
    <text x="40" y="316" fill="#64748B" font-size="6" font-weight="bold">NOTES:</text>
    <text x="40" y="330" fill="#64748B" font-size="5">1. ALL PIPING PER ASME B31.1</text>
    <text x="40" y="342" fill="#64748B" font-size="5">2. ALL INSTRUMENTS PER ISA-5.1</text>
    <text x="40" y="354" fill="#64748B" font-size="5">3. PSV-101 SET AT 1650 PSIG PER API 520</text>
    <text x="40" y="370" fill="#0891B2" font-size="5" font-style="italic">Generated by Claude AI | Validated</text>
  </g>
</svg>
