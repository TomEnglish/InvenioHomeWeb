<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse { 0%{r:4;opacity:1} 50%{r:8;opacity:0.3} 100%{r:4;opacity:1} }
    @keyframes dashFlow { from{stroke-dashoffset:20} to{stroke-dashoffset:0} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes truck { 0%{transform:translate(0,0)} 100%{transform:translate(60px,0)} }
    @keyframes ship { 0%{transform:translate(0,0)} 50%{transform:translate(30px,-5px)} 100%{transform:translate(60px,0)} }
    @keyframes countUp { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
    @keyframes scanPulse { 0%{stroke-opacity:0.8;r:12} 100%{stroke-opacity:0;r:24} }
    @keyframes breathe { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:0.6} }
    @keyframes dataStream { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-20px);opacity:0} }
    @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes barPulse1 { 0%{width:120px} 50%{width:128px} 100%{width:120px} }
    @keyframes barPulse2 { 0%{width:95px} 50%{width:102px} 100%{width:95px} }
    @keyframes barPulse3 { 0%{width:140px} 50%{width:146px} 100%{width:140px} }
    @keyframes alertBlink { 0%{opacity:1} 50%{opacity:0.2} 100%{opacity:1} }
    .flow-line { stroke-dasharray: 8 6; animation: dashFlow 1s linear infinite; }
    .fade { opacity:0; animation: fadeIn 0.6s ease forwards; }
    .d1{animation-delay:0.1s} .d2{animation-delay:0.3s} .d3{animation-delay:0.5s}
    .d4{animation-delay:0.7s} .d5{animation-delay:0.9s} .d6{animation-delay:1.1s}
    .d7{animation-delay:1.3s} .d8{animation-delay:1.5s}
    text { font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0A0F1A"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0891B2;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.3"/>
  </pattern>
  <rect width="800" height="700" fill="url(#g)" opacity="0.5"/>

  <!-- ===== TOP: Mini KPI Bar ===== -->
  <g class="fade d1">
    <rect x="20" y="16" width="760" height="36" rx="8" fill="#1E293B" opacity="0.6"/>

    <circle cx="42" cy="34" r="3" fill="#22C55E"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="52" y="38" fill="#94A3B8" font-size="9" class="mono">LIVE</text>

    <text x="120" y="38" fill="#64748B" font-size="8">POs</text>
    <text x="145" y="38" fill="#22D3EE" font-size="10" font-weight="700" class="mono">847</text>

    <text x="220" y="38" fill="#64748B" font-size="8">Shipments</text>
    <text x="280" y="38" fill="#22D3EE" font-size="10" font-weight="700" class="mono">127</text>

    <text x="350" y="38" fill="#64748B" font-size="8">In Transit</text>
    <text x="410" y="38" fill="#F59E0B" font-size="10" font-weight="700" class="mono">7</text>
    <text x="410" y="38" fill="#F59E0B" font-size="10" font-weight="700" class="mono"><animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>7</text>

    <text x="460" y="38" fill="#64748B" font-size="8">Delivered</text>
    <text x="520" y="38" fill="#22C55E" font-size="10" font-weight="700" class="mono">46</text>

    <text x="580" y="38" fill="#64748B" font-size="8">Install</text>
    <text x="620" y="38" fill="#A78BFA" font-size="10" font-weight="700" class="mono">68%</text>

    <text x="690" y="38" fill="#64748B" font-size="8">Value</text>
    <text x="720" y="38" fill="#22D3EE" font-size="10" font-weight="700" class="mono">$4.98M</text>
  </g>

  <!-- ===== CENTER: Animated Map/Network ===== -->

  <!-- Map outline (simplified US Gulf Coast) -->
  <g class="fade d2" opacity="0.3">
    <path d="M100,250 C150,240 200,235 280,240 C320,242 360,250 400,260 C440,270 480,265 520,255 C560,245 600,240 650,245 C700,250 720,260 740,270" fill="none" stroke="#334155" stroke-width="1.5"/>
    <path d="M280,240 C290,260 300,280 310,300 C320,310 330,305 340,295 C350,285 360,275 370,270 C380,265 390,268 400,260" fill="none" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Location nodes -->
  <!-- Houston -->
  <g class="fade d3">
    <circle cx="340" cy="290" r="20" fill="url(#nodeGlow)"/>
    <circle cx="340" cy="290" r="6" fill="#0891B2" filter="url(#glow)"/>
    <circle cx="340" cy="290" r="6" fill="none" stroke="#22D3EE" stroke-width="0.5"><animate attributeName="r" values="6;14;6" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <text x="340" y="315" fill="#94A3B8" font-size="8" text-anchor="middle">HOUSTON, TX</text>
    <text x="340" y="325" fill="#22D3EE" font-size="7" text-anchor="middle" class="mono">HQ + Yard</text>
  </g>

  <!-- Freeport -->
  <g class="fade d4">
    <circle cx="380" cy="340" r="16" fill="url(#nodeGlow)"/>
    <circle cx="380" cy="340" r="5" fill="#22C55E" filter="url(#glow)"/>
    <circle cx="380" cy="340" r="5" fill="none" stroke="#22C55E" stroke-width="0.5"><animate attributeName="r" values="5;12;5" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <text x="380" y="362" fill="#94A3B8" font-size="8" text-anchor="middle">FREEPORT, TX</text>
    <text x="380" y="372" fill="#22C55E" font-size="7" text-anchor="middle" class="mono">LNG Site</text>
  </g>

  <!-- Port Arthur -->
  <g class="fade d4">
    <circle cx="460" cy="280" r="14" fill="url(#nodeGlow)"/>
    <circle cx="460" cy="280" r="4.5" fill="#A78BFA" filter="url(#glow)"/>
    <text x="460" y="300" fill="#94A3B8" font-size="8" text-anchor="middle">PORT ARTHUR</text>
    <text x="460" y="310" fill="#A78BFA" font-size="7" text-anchor="middle" class="mono">Fabrication</text>
  </g>

  <!-- New York -->
  <g class="fade d5">
    <circle cx="650" cy="200" r="14" fill="url(#nodeGlow)"/>
    <circle cx="650" cy="200" r="4.5" fill="#F59E0B" filter="url(#glow)"/>
    <text x="650" y="220" fill="#94A3B8" font-size="8" text-anchor="middle">GOULDS NY</text>
    <text x="650" y="230" fill="#F59E0B" font-size="7" text-anchor="middle" class="mono">Vendor</text>
  </g>

  <!-- Bayonne -->
  <g class="fade d5">
    <circle cx="180" cy="260" r="14" fill="url(#nodeGlow)"/>
    <circle cx="180" cy="260" r="4.5" fill="#0891B2" filter="url(#glow)"/>
    <text x="180" y="280" fill="#94A3B8" font-size="8" text-anchor="middle">BAYONNE, NJ</text>
    <text x="180" y="290" fill="#0891B2" font-size="7" text-anchor="middle" class="mono">Port</text>
  </g>

  <!-- Gonzales -->
  <g class="fade d4">
    <circle cx="260" cy="320" r="12" fill="url(#nodeGlow)"/>
    <circle cx="260" cy="320" r="4" fill="#EF4444" filter="url(#glow)"/>
    <circle cx="260" cy="320" r="4" fill="none" stroke="#EF4444" stroke-width="1"><animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/></circle>
