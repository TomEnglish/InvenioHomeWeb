<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes dropBar { from{height:0;y:400} to{} }
    @keyframes shrinkBar { 0%{opacity:1} 50%{opacity:0.6} 100%{opacity:1} }
    @keyframes slashIn { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0 0 0)} }
    @keyframes countDown { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
    @keyframes savingsPop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes checkMark { from{stroke-dashoffset:20} to{stroke-dashoffset:0} }
    .fade { opacity:0; animation: fadeIn 0.5s ease forwards; }
    .d1{animation-delay:0.2s} .d2{animation-delay:0.4s} .d3{animation-delay:0.6s}
    .d4{animation-delay:0.8s} .d5{animation-delay:1.0s} .d6{animation-delay:1.2s}
    .d7{animation-delay:1.4s} .d8{animation-delay:1.6s} .d9{animation-delay:1.8s}
    .d10{animation-delay:2.0s} .d11{animation-delay:2.2s}
    text { font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0A0F1A"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect width="900" height="520" fill="url(#g)" opacity="0.4"/>

  <!-- Title -->
  <g class="fade d1">
    <text x="450" y="36" fill="#E2E8F0" font-size="13" text-anchor="middle" font-weight="700">WHERE PROJECTS BLEED MONEY</text>
    <text x="450" y="52" fill="#64748B" font-size="8" text-anchor="middle">Typical capital project waste — and what Invenio eliminates</text>
  </g>

  <!-- Y-axis -->
  <g class="fade d2">
    <line x1="80" y1="75" x2="80" y2="400" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="80" fill="#64748B" font-size="7" text-anchor="end" class="mono">$2.5M</text>
    <line x1="75" y1="80" x2="80" y2="80" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="145" fill="#64748B" font-size="7" text-anchor="end" class="mono">$2.0M</text>
    <line x1="75" y1="145" x2="80" y2="145" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="210" fill="#64748B" font-size="7" text-anchor="end" class="mono">$1.5M</text>
    <line x1="75" y1="210" x2="80" y2="210" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="275" fill="#64748B" font-size="7" text-anchor="end" class="mono">$1.0M</text>
    <line x1="75" y1="275" x2="80" y2="275" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="340" fill="#64748B" font-size="7" text-anchor="end" class="mono">$0.5M</text>
    <line x1="75" y1="340" x2="80" y2="340" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="403" fill="#64748B" font-size="7" text-anchor="end" class="mono">$0</text>
    <line x1="80" y1="400" x2="820" y2="400" stroke="#334155" stroke-width="0.5"/>
    <!-- Grid lines -->
    <line x1="80" y1="145" x2="820" y2="145" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="80" y1="210" x2="820" y2="210" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="80" y1="275" x2="820" y2="275" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="80" y1="340" x2="820" y2="340" stroke="#1E293B" stroke-width="0.3"/>
  </g>

  <!-- ===== WASTE BARS (red/orange, showing the cost) ===== -->

  <!-- Bar 1: Emergency Expediting - $2.1M -->
  <g class="fade d3">
    <rect x="110" y="93" width="90" height="307" rx="4" fill="#EF4444" opacity="0.25"/>
    <rect x="110" y="93" width="90" height="307" rx="4" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
    <rect x="110" y="93" width="90" height="307" rx="4" fill="#EF4444" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="155" y="88" fill="#EF4444" font-size="10" text-anchor="middle" font-weight="700" class="mono">$2.1M</text>
    <text x="155" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Emergency</text>
    <text x="155" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">Expediting</text>
    <!-- Slash through showing reduction -->
    <line x1="108" y1="390" x2="202" y2="100" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="2s"/>
    </line>
    <text x="155" y="250" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3s"/>-85%
    </text>
  </g>

  <!-- Bar 2: Rework & Rejection - $1.8M -->
  <g class="fade d4">
    <rect x="230" y="132" width="90" height="268" rx="4" fill="#F59E0B" opacity="0.25"/>
    <rect x="230" y="132" width="90" height="268" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
    <rect x="230" y="132" width="90" height="268" rx="4" fill="#F59E0B" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="275" y="127" fill="#F59E0B" font-size="10" text-anchor="middle" font-weight="700" class="mono">$1.8M</text>
    <text x="275" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Rework &</text>
    <text x="275" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">Rejection</text>
    <line x1="228" y1="390" x2="322" y2="140" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="2.3s"/>
    </line>
    <text x="275" y="260" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.3s"/>-60%
    </text>
  </g>

  <!-- Bar 3: Double Orders - $1.4M -->
  <g class="fade d5">
    <rect x="350" y="184" width="90" height="216" rx="4" fill="#EF4444" opacity="0.25"/>
    <rect x="350" y="184" width="90" height="216" rx="4" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
    <rect x="350" y="184" width="90" height="216" rx="4" fill="#EF4444" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="395" y="179" fill="#EF4444" font-size="10" text-anchor="middle" font-weight="700" class="mono">$1.4M</text>
    <text x="395" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Double</text>
    <text x="395" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">Orders</text>
    <line x1="348" y1="390" x2="442" y2="190" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="2.6s"/>
    </line>
    <text x="395" y="290" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.6s"/>-90%
    </text>
  </g>

  <!-- Bar 4: Storage & Insurance - $0.9M -->
  <g class="fade d6">
    <rect x="470" y="283" width="90" height="117" rx="4" fill="#F59E0B" opacity="0.25"/>
    <rect x="470" y="283" width="90" height="117" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
    <rect x="470" y="283" width="90" height="117" rx="4" fill="#F59E0B" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="515" y="278" fill="#F59E0B" font-size="10" text-anchor="middle" font-weight="700" class="mono">$0.9M</text>
    <text x="515" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Storage &</text>
    <text x="515" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">Insurance</text>
    <line x1="468" y1="390" x2="562" y2="290" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="2.9s"/>
    </line>
    <text x="515" y="340" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.9s"/>-45%
    </text>
  </g>

  <!-- Bar 5: Shrinkage & Loss - $0.7M -->
  <g class="fade d7">
    <rect x="590" y="309" width="90" height="91" rx="4" fill="#EF4444" opacity="0.25"/>
    <rect x="590" y="309" width="90" height="91" rx="4" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
    <rect x="590" y="309" width="90" height="91" rx="4" fill="#EF4444" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <text x="635" y="304" fill="#EF4444" font-size="10" text-anchor="middle" font-weight="700" class="mono">$0.7M</text>
    <text x="635" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Shrinkage</text>
    <text x="635" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">& Loss</text>
    <line x1="588" y1="390" x2="682" y2="315" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="3.2s"/>
    </line>
    <text x="635" y="355" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="4.2s"/>-70%
    </text>
  </g>

  <!-- Bar 6: Manual Reporting - $0.5M -->
  <g class="fade d8">
    <rect x="710" y="335" width="90" height="65" rx="4" fill="#F59E0B" opacity="0.25"/>
    <rect x="710" y="335" width="90" height="65" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
    <rect x="710" y="335" width="90" height="65" rx="4" fill="#F59E0B" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="755" y="330" fill="#F59E0B" font-size="10" text-anchor="middle" font-weight="700" class="mono">$0.5M</text>
    <text x="755" y="418" fill="#94A3B8" font-size="7" text-anchor="middle">Manual</text>
    <text x="755" y="428" fill="#94A3B8" font-size="7" text-anchor="middle">Reporting</text>
    <line x1="708" y1="390" x2="802" y2="340" stroke="#22C55E" stroke-width="2" opacity="0.8" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze" begin="3.5s"/>
    </line>
    <text x="755" y="365" fill="#22C55E" font-size="9" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="4.5s"/>-95%
    </text>
  </g>

  <!-- ===== BOTTOM: Total Savings Summary ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze" begin="4.8s"/>

    <rect x="100" y="450" width="700" height="55" rx="8" fill="#161B22" stroke="#22C55E" stroke-width="0.8"/>

    <text x="140" y="474" fill="#64748B" font-size="8">TOTAL ANNUAL WASTE</text>
    <text x="140" y="492" fill="#EF4444" font-size="14" font-weight="700" class="mono" text-decoration="line-through">$7.4M</text>

    <line x1="320" y1="458" x2="320" y2="498" stroke="#334155" stroke-width="0.5"/>

    <text x="360" y="474" fill="#64748B" font-size="8">WITH INVENIO</text>
    <text x="360" y="492" fill="#22C55E" font-size="14" font-weight="700" class="mono">$1.8M</text>

    <line x1="520" y1="458" x2="520" y2="498" stroke="#334155" stroke-width="0.5"/>

    <text x="560" y="474" fill="#64748B" font-size="8">ANNUAL SAVINGS</text>
    <text x="560" y="492" fill="#22D3EE" font-size="14" font-weight="700" class="mono">$5.6M</text>
    <text x="560" y="492" fill="#22D3EE" font-size="14" font-weight="700" class="mono">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>$5.6M
    </text>

    <line x1="680" y1="458" x2="680" y2="498" stroke="#334155" stroke-width="0.5"/>

    <text x="720" y="474" fill="#64748B" font-size="8">REDUCTION</text>
    <rect x="710" y="480" width="70" height="20" rx="4" fill="rgba(34,197,94,0.15)"/>
    <text x="745" y="494" fill="#22C55E" font-size="12" font-weight="700" text-anchor="middle" class="mono">76%</text>
  </g>
</svg>
